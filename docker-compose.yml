services:
  pos_db:
    image: postgres:18
    container_name: library_database
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker/
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env.docker
    depends_on:
      pos_db:
        condition: service_healthy
    restart: on-failure

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env.docker
    depends_on:
      migrate:
        condition: service_completed_successfully
      pos_db:
        condition: service_healthy

volumes:
  postgres_data:
